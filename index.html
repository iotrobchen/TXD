    async function loadCCTV() {
      const res = await fetch(
        "https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/City/NewTaipei?$format=JSON",

          headers: {
            "Authorization": "Bearer " + token

        }
      );

      const data = await res.json();

      console.log("CCTV總數：", data.length);

      const container = document.getElementById("images");
      container.innerHTML = "";

      data.forEach(cctv => {

        // 👉 有影像才顯示
        if (cctv.CCTVPictures?.length > 0) {

          const img = document.createElement("img");

          // 防快取（很重要）
          img.src = cctv.CCTVPictures[0].ImageUrl + "?t=" + Date.now();
          img.width = 400;

          const title = document.createElement("p");
          title.innerText = cctv.LocationDescription || "未知位置";

          container.appendChild(title);
          container.appendChild(img);
        }
      });
    }

    loadCCTV();

    // 每60秒更新一次
    setInterval(loadCCTV, 60000);
