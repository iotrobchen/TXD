<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>鳶山堰及三峽即時影像</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; color: inherit; display: block; }
        .card:hover { background: #eef6ff; transform: translateY(-3px); }
        .title { font-weight: bold; color: #007bff; margin-bottom: 8px; }
        .tag { font-size: 0.8em; background: #eee; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>📍 鳶山堰 / 三峽 即時監控</h1>
    <div id="grid" class="grid">搜尋中...</div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('grid');
                if (data.length === 0) {
                    grid.innerHTML = '找不到包含「鳶山」的影像，請確認水利署權限是否開通。';
                    return;
                }
                grid.innerHTML = '';
                data.forEach(item => {
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = item.URL;
                    card.target = '_blank';
                    card.innerHTML = `
                        <div class="title">${item.Name}</div>
                        <span class="tag">來源: ${item.Source}</span>
                        <p style="font-size: 0.9em; color: #666;">點擊開啟影像畫面</p>
                    `;
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
