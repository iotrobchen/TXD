<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>三峽區即時影像監控</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info { padding: 10px; }
        .title { font-weight: bold; color: #333; margin-bottom: 5px; }
        .desc { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <h1>三峽地區即時影像</h1>
    <div id="cctv-grid" class="grid">載入中...</div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('cctv-grid');
                grid.innerHTML = '';
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="video-container">
                            <iframe src="${item.VideoStreamURL}" allowfullscreen></iframe>
                        </div>
                        <div class="info">
                            <div class="title">${item.RoadName || '未知路段'}</div>
                            <div class="desc">${item.SurveillanceDescription}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('cctv-grid').innerHTML = '資料載入失敗：' + err;
            });
    </script>
</body>
</html>
