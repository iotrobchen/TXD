<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TDX CCTV 測試</title>
    <style>
        .cctv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .cctv-item { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #f9f9f9; text-align: center; }
        .cctv-item p { padding: 10px; margin: 0; font-weight: bold; background: #eee; font-size: 14px; }
        .cctv-item img { width: 100%; height: 225px; object-fit: cover; display: block; background: #000; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">台北市即時交通影像測試</h2>
    <div id="display" class="cctv-grid">正在初始化並取得 Token...</div>

<script>
async function getCCTV() {
    // 請將以下更換為你新申請的 Key
    const client_id = 'iotrobchen-b5b93caa-f0ca-455a'; 
    const client_secret = '7c3b0b4d-50cf-4b34-9110-b5a1afa425cf'; 

    const proxy = "https://corsproxy.io/?";
    const auth_url = `${proxy}https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token`;
    const api_url = `${proxy}https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/City/Taipei?$top=12&$format=JSON`;

    try {
        // 1. 取得 Token
        const authRes = await fetch(auth_url, {
            method: 'POST',
            headers: { 'content-type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                grant_type: 'client_credentials',
                client_id: client_id,
                client_secret: client_secret
            })
        });

        if (!authRes.ok) throw new Error(`驗證失敗: ${authRes.status}`);
        const authData = await authRes.json();
        const token = authData.access_token;

        // 2. 取得資料
        const apiRes = await fetch(api_url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!apiRes.ok) throw new Error(`API 請求失敗: ${apiRes.status}`);
        
        const data = await apiRes.json();
        renderCCTV(data);
    } catch (err) {
        console.error('Debug:', err);
        document.getElementById('display').innerHTML = `<p style="color:red;">錯誤: ${err.message}</p>`;
    }
}

function renderCCTV(data) {
    const container = document.getElementById('display');
    container.innerHTML = '';

    data.forEach(item => {
        // 修正台北市網址可能產生的 Mixed Content 問題 (http 改為 https)
        let videoUrl = item.VideoStreamURL.replace("http://", "https://");
        
        const div = document.createElement('div');
        div.className = 'cctv-item';
        div.innerHTML = `
            <p>${item.CCTVName}</p>
            <img src="${videoUrl}" 
                 alt="監視器畫面" 
                 onerror="this.onerror=null; this.src='https://placehold.co/300x225?text=影像載入中或失效';">
        `;
        container.appendChild(div);
    });
}

getCCTV();
</script>
</body>
</html>
