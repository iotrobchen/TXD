<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛行觀測站 (公路局版)</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 15px; }
        .section-tag { background: #01579b; padding: 8px; border-radius: 4px; margin: 20px 0 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card p { padding: 10px; margin: 0; font-size: 13px; background: #263238; }
        img { width: 100%; height: 210px; background: #000; display: block; object-fit: contain; }
        .loading { text-align: center; margin-top: 50px; color: #888; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#4fc3f7;">🚁 飛行區周邊公路觀測</h2>
    <div id="loading" class="loading">正在連線至公路局監視器...</div>

    <div class="section-tag">📍 後村堰周邊 (國道3號/台65)</div>
    <div id="hcy-grid" class="grid"></div>

    <div class="section-tag">📍 浮洲周邊 (台65/省道)</div>
    <div id="fz-grid" class="grid"></div>

<script>
    const ID = 'iotrobchen-b5b93caa-f0ca-455a';
    const SECRET = '7c3b0b4d-50cf-4b34-9110-b5a1afa425cf';

    const PROXY = "https://corsproxy.io/?";
    const AUTH_URL = `${PROXY}https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token`;
    
    // 這次改抓 國道 (InterCity) 與 省道 (Province) 的 API
    const API_INTER = `${PROXY}https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/InterCity?$format=JSON`;
    const API_PROV = `${PROXY}https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/Province?$format=JSON`;

    const LOCS = {
        HCY: { lat: 24.9655, lon: 121.3739 }, // 後村堰
        FZ: { lat: 25.002, lon: 121.445 }    // 浮洲
    };

    async function start() {
        try {
            const auth = await fetch(AUTH_URL, {
                method: 'POST',
                headers: { 'content-type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ grant_type: 'client_credentials', client_id: ID, client_secret: SECRET })
            });
            const { access_token } = await auth.json();

            // 同時抓國道與省道資料
            const [res1, res2] = await Promise.all([
                fetch(API_INTER, { headers: { 'Authorization': `Bearer ${access_token}` } }),
                fetch(API_PROV, { headers: { 'Authorization': `Bearer ${access_token}` } })
            ]);
            
            const data1 = await res1.json();
            const data2 = await res2.json();
            const all = [...(data1.value || data1), ...(data2.value || data2)];

            document.getElementById('loading').style.display = 'none';

            // 渲染：範圍放大到 5km (0.04度) 確保能抓到公路影像
            render(all, 'hcy-grid', LOCS.HCY);
            render(all, 'fz-grid', LOCS.FZ);

        } catch (e) {
            document.getElementById('loading').innerText = "失敗，請重設 Secret 再試一次。";
        }
    }

    function render(data, gridId, coord) {
        const grid = document.getElementById(gridId);
        const filtered = data.filter(item => {
            return Math.abs(item.PositionLat - coord.lat) < 0.04 && 
                   Math.abs(item.PositionLon - coord.lon) < 0.04;
        });

        filtered.forEach(item => {
            let url = item.VideoStreamURL.replace("http://", "https://");
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <p>${item.CCTVName}</p>
                <img src="${url}" onerror="this.src='https://placehold.co/300x200?text=影像載入中...'">
            `;
            grid.appendChild(card);
        });
    }

    start();
</script>
</body>
</html>
