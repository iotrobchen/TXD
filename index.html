<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台北市即時影像 (iframe 版)</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        h1 { text-align: center; }
        #display { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }
        .card { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
        }
        .card p { 
            padding: 10px; 
            margin: 0; 
            font-size: 14px; 
            font-weight: bold; 
            background: #333; 
            color: white; 
        }
        /* 讓 iframe 比例正確 (16:9) */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>台北市交通即時影像</h1>
    <div id="display">正在載入影像清單...</div>

<script>
    // 請填入你的金鑰
    const ID = 'iotrobchen-b5b93caa-f0ca-455a';
    const SECRET = '7c3b0b4d-50cf-4b34-9110-b5a1afa425cf';

    const PROXY = "https://corsproxy.io/?";
    const AUTH_URL = `${PROXY}https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token`;
    const API_URL = `${PROXY}https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/City/Taipei?$top=30&$format=JSON`;

    async function start() {
        const el = document.getElementById('display');
        try {
            // 1. 取得 Token
            const auth = await fetch(AUTH_URL, {
                method: 'POST',
                headers: { 'content-type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ grant_type: 'client_credentials', client_id: ID, client_secret: SECRET })
            });
            const authData = await auth.json();
            
            // 2. 抓取資料
            const res = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${authData.access_token}` } });
            const result = await res.json();
            
            // 3. 關鍵修正：讀取 result.CCTVs
            const list = result.CCTVs || [];
            
            if (list.length === 0) {
                el.innerHTML = "找不到監視器資料。";
                return;
            }

            el.innerHTML = '';
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                // 使用 iframe 嵌入台北市的影像網頁
                div.innerHTML = `
                    <p>${item.RoadName || ''} ${item.CCTVID}</p>
                    <div class="video-container">
                        <iframe src="${item.VideoStreamURL}" allowfullscreen></iframe>
                    </div>
                `;
                el.appendChild(div);
            });

        } catch (err) {
            el.innerHTML = "錯誤：" + err.message;
        }
    }

    start();
</script>
</body>
</html>
