<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>飛行觀測最終修復版</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; text-align: center; }
        .input-box { background: #222; padding: 20px; border-radius: 12px; margin: 10px; display: inline-block; }
        input { padding: 10px; width: 220px; margin: 5px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; }
        button { padding: 10px 25px; background: #ff9800; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-width: 1200px; margin: 20px auto; }
        .card { background: #1e1e1e; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        img { width: 100%; height: 210px; background: #000; object-fit: contain; }
        p { padding: 10px; margin: 0; font-size: 13px; text-align: left; background: #333; }
    </style>
</head>
<body>

    <h1>🚁 飛行區公路影像觀測</h1>

    <div class="input-box">
        <input type="text" id="cid" placeholder="Client ID">
        <input type="password" id="csec" placeholder="Client Secret">
        <button onclick="start()">啟動連線</button>
    </div>

    <div id="status" style="color: #ffeb3b; margin: 10px;"></div>

    <div style="text-align:left; max-width:1200px; margin: 0 auto; color:#ff9800; font-weight:bold;">📍 後村堰 & 浮洲觀測點</div>
    <div id="display-grid" class="grid"></div>

<script>
    async function start() {
        const ID = document.getElementById('cid').value.trim();
        const SECRET = document.getElementById('csec').value.trim();
        const status = document.getElementById('status');
        const grid = document.getElementById('display-grid');

        if(!ID || !SECRET) { status.innerText = "請輸入金鑰"; return; }
        
        status.innerText = "⏳ 嘗試建立安全連線...";
        grid.innerHTML = "";

        try {
            // 1. 取得 Token (直接向 TDX 請求，不透過 Proxy)
            const authRes = await fetch("https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token", {
                method: 'POST',
                headers: { 'content-type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    grant_type: 'client_credentials',
                    client_id: ID,
                    client_secret: SECRET
                })
            });

            if (!authRes.ok) throw new Error("金鑰錯誤或被拒絕 (401/403)");
            const authData = await authRes.json();
            const token = authData.access_token;

            status.innerText = "✅ 驗證成功，正在下載公路資料...";

            // 2. 取得國道資料 (國道資料最穩定)
            const apiRes = await fetch("https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/InterCity?$format=JSON", {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await apiRes.json();
            const list = data.value || data;

            // 3. 過濾並渲染 (鎖定後村堰與浮洲中間的台65與國3)
            const targetHCY = { lat: 24.9655, lon: 121.3739 };
            const targetFZ = { lat: 25.002, lon: 121.445 };

            const filtered = list.filter(item => {
                const nearHCY = Math.abs(item.PositionLat - targetHCY.lat) < 0.05 && Math.abs(item.PositionLon - targetHCY.lon) < 0.05;
                const nearFZ = Math.abs(item.PositionLat - targetFZ.lat) < 0.05 && Math.abs(item.PositionLon - targetFZ.lon) < 0.05;
                return nearHCY || nearFZ;
            });

            if(filtered.length === 0) { status.innerText = "⚠️ 範圍內無可用公路影像"; return; }

            filtered.forEach(item => {
                const imgUrl = item.VideoStreamURL.replace("http://", "https://");
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${imgUrl}" onerror="this.src='https://placehold.co/300x210?text=影像離線';"><p>${item.CCTVName}</p>`;
                grid.appendChild(card);
            });

            status.innerText = "觀測中";

        } catch (e) {
            status.innerText = "❌ 連線失敗: " + e.message + "。請嘗試換個瀏覽器或關閉廣告攔截器。";
        }
    }
</script>
</body>
</html>
