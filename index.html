<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>飛行觀測最終修復版</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; text-align: center; }
        .input-group { background: #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: inline-block; }
        input { padding: 8px; width: 250px; margin: 5px; border-radius: 4px; border: none; }
        button { padding: 8px 20px; background: #00d4ff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .section-tag { background: #01579b; padding: 8px; border-radius: 4px; margin: 20px 0; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #263238; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        img { width: 100%; height: 225px; background: #000; object-fit: contain; }
        p { margin: 0; padding: 10px; font-size: 13px; text-align: left; }
    </style>
</head>
<body>

    <h1>🚁 飛行區周邊公路即時影像</h1>

    <div class="input-group">
        <input type="text" id="cid" placeholder="Client ID">
        <input type="password" id="csec" placeholder="Client Secret">
        <button onclick="start()">開始觀測</button>
        <p style="font-size:11px; color:#888; text-align:center;">輸入完按「開始觀測」，若失敗請檢查 TDX 後台 Key 是否重設</p>
    </div>

    <div id="status"></div>

    <div class="section-tag">📍 後村堰周邊 (國道3號/台65)</div>
    <div id="hcy-grid" class="grid"></div>

    <div class="section-tag">📍 浮洲周邊 (台65/省道)</div>
    <div id="fz-grid" class="grid"></div>

<script>
    async function start() {
        // 優先讀取輸入框，若空白則讀取程式預設值
        const ID = document.getElementById('cid').value || '你的CLIENT_ID';
        const SECRET = document.getElementById('csec').value || '你的CLIENT_SECRET';
        const status = document.getElementById('status');

        // 清空舊畫面
        document.getElementById('hcy-grid').innerHTML = '';
        document.getElementById('fz-grid').innerHTML = '';
        status.innerHTML = "正在驗證金鑰...";

        try {
            // 1. 直接呼叫 TDX (不用 Proxy)
            const authRes = await fetch("https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token", {
                method: 'POST',
                headers: { 'content-type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    grant_type: 'client_credentials',
                    client_id: ID,
                    client_secret: SECRET
                })
            });

            if (!authRes.ok) throw new Error("驗證失敗！請確認 ID 與 Secret 是否正確。");
            const { access_token } = await authRes.json();
            status.innerHTML = "驗證成功，正在讀取公路影像...";

            // 2. 抓取國道 & 省道 (一樣不用 Proxy，直接呼叫)
            const urls = [
                "https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/InterCity?$format=JSON",
                "https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/Province?$format=JSON"
            ];

            const responses = await Promise.all(urls.map(url => 
                fetch(url, { headers: { 'Authorization': `Bearer ${access_token}` } }).then(r => r.json())
            ));

            const allData = [...(responses[0].value || responses[0]), ...(responses[1].value || responses[1])];
            status.innerHTML = "";

            // 3. 渲染
            render(allData, 'hcy-grid', { lat: 24.9655, lon: 121.3739 });
            render(allData, 'fz-grid', { lat: 25.002, lon: 121.445 });

        } catch (e) {
            status.innerHTML = `<b style="color:#ff5252;">${e.message}</b>`;
        }
    }

    function render(data, gridId, target) {
        const grid = document.getElementById(gridId);
        // 篩選半徑約 4-5 公里 (0.04度)
        const filtered = data.filter(item => 
            Math.abs(item.PositionLat - target.lat) < 0.04 && 
            Math.abs(item.PositionLon - target.lon) < 0.04
        );

        if(filtered.length === 0) grid.innerHTML = "<p>範圍內無公路影像</p>";

        filtered.forEach(item => {
            const url = item.VideoStreamURL.replace("http://", "https://");
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${url}" onerror="this.src='https://placehold.co/300x225?text=影像離線或維護中'">
                <p>${item.CCTVName}</p>
            `;
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
