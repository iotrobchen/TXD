<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>後村堰飛行場觀測地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .popup-video { width: 320px; height: 240px; }
        .info-panel {
            position: absolute; top: 10px; left: 60px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3 style="margin:0">後村堰飛行場周邊即時影像</h3>
        <p style="margin:5px 0 0; font-size:12px;">點擊地圖圖標查看氣候狀態</p>
    </div>
    <div id="map"></div>

<script>
    const ID = 'iotrobchen-b5b93caa-f0ca-455a';
    const SECRET = '7c3b0b4d-50cf-4b34-9110-b5a1afa425cf';

    // 飛行場座標 (大約位置)
    const FLY_ZONE = [24.9665, 121.3935]; 

    const PROXY = "https://corsproxy.io/?";
    const AUTH_URL = `${PROXY}https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token`;
    // 改抓新北市 (NewTaipei) 的資料
    const API_URL = `${PROXY}https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/City/NewTaipei?$format=JSON`;

    // 初始化地圖
    const map = L.map('map').setView(FLY_ZONE, 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 標記飛行場位置
    L.marker(FLY_ZONE, {title: "後村堰飛行場"}).addTo(map)
        .bindPopup("<b>後村堰飛行場</b>").openPopup();

    async function loadCCTV() {
        try {
            // 1. 取得 Token
            const auth = await fetch(AUTH_URL, {
                method: 'POST',
                headers: { 'content-type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ grant_type: 'client_credentials', client_id: ID, client_secret: SECRET })
            });
            const authData = await auth.json();

            // 2. 抓取新北市資料
            const res = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${authData.access_token}` } });
            const result = await res.json();
            const list = result.CCTVs || [];

            // 3. 過濾出距離飛行場較近的監視器 (經緯度差異在 0.05 以內)
            const nearby = list.filter(item => {
                const dLat = Math.abs(item.PositionLat - FLY_ZONE[0]);
                const dLon = Math.abs(item.PositionLon - FLY_ZONE[1]);
                return dLat < 0.04 && dLon < 0.04; 
            });

            // 4. 將監視器加入地圖
            nearby.forEach(item => {
                const marker = L.marker([item.PositionLat, item.PositionLon]).addTo(map);
                
                // 點擊後顯示彈窗影像
                marker.bindPopup(`
                    <div class="popup-video">
                        <p style="margin:0 0 5px; font-size:12px;"><b>${item.CCTVName}</b></p>
                        <iframe src="${item.VideoStreamURL}" width="100%" height="200" frameborder="0" allowfullscreen></iframe>
                    </div>
                `);
            });

        } catch (err) {
            console.error("載入失敗:", err);
        }
    }

    loadCCTV();
</script>
</body>
</html>
