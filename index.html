<!DOCTYPE html>
<html>
<head>
    <title>鳶山堰即時影像</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="background:#000; color:#fff; text-align:center;">
    <h2>鳶山堰即時影像</h2>
    <video id="video" controls style="width:80%; max-width:800px;"></video>
    <script>
        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                const url = data[0].VideoStreamURL; // 抓取清單第一個影像
                const video = document.getElementById('video');
                if (Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                }
            });
    </script>
</body>
</html>
