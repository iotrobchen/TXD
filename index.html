<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>飛行觀測儀表板</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; color: white; margin: 0; padding: 20px; }
        .section-title { background: #e67e22; padding: 10px; border-radius: 5px; margin: 20px 0 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #34495e; border-radius: 8px; overflow: hidden; border: 1px solid #455a64; }
        .card p { padding: 8px; margin: 0; font-size: 13px; text-align: center; background: rgba(0,0,0,0.3); }
        .img-container { width: 100%; height: 225px; background: #000; position: relative; }
        img { width: 100%; height: 100%; object-fit: contain; }
        .loading { text-align: center; padding: 50px; font-size: 20px; }
        /* 按鈕樣式可點擊開啟原網址 */
        .btn-link { display: block; text-decoration: none; color: #3498db; font-size: 11px; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <h1>🚁 飛行天候監測儀表板</h1>

    <div id="loading" class="loading">正在掃描後村堰與浮洲周邊影像...</div>

    <div class="section-title">📍 後村堰飛行場周邊 (樹林/鶯歌)</div>
    <div id="hcy-grid" class="grid"></div>

    <div class="section-title">📍 浮洲環保公園周邊 (板橋/土城)</div>
    <div id="fz-grid" class="grid"></div>

<script>
    const ID = 'iotrobchen-b5b93caa-f0ca-455a';
    const SECRET = '7c3b0b4d-50cf-4b34-9110-b5a1afa425cf';

    const PROXY = "https://corsproxy.io/?";
    const AUTH_URL = `${PROXY}https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token`;
    const API_URL = `${PROXY}https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/City/NewTaipei?$format=JSON`;

    // 關鍵座標鎖定
    const LOCATIONS = {
        HCY: { lat: 24.9665, lon: 121.3935, name: "後村堰" },
        FZ: { lat: 25.002, lon: 121.445, name: "浮洲" }
    };

    async function fetchData() {
        try {
            const auth = await fetch(AUTH_URL, {
                method: 'POST',
                headers: { 'content-type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ grant_type: 'client_credentials', client_id: ID, client_secret: SECRET })
            });
            const authData = await auth.json();

            const res = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${authData.access_token}` } });
            const result = await res.json();
            const allCCTVs = result.CCTVs || [];

            document.getElementById('loading').style.display = 'none';

            // 渲染後村堰 (方圓 3km)
            renderGrid('hcy-grid', allCCTVs, LOCATIONS.HCY);
            // 渲染浮洲 (方圓 3km)
            renderGrid('fz-grid', allCCTVs, LOCATIONS.FZ);

        } catch (err) {
            document.getElementById('loading').innerHTML = "載入失敗: " + err.message;
        }
    }

    function renderGrid(elementId, data, target) {
        const container = document.getElementById(elementId);
        
        // 篩選距離目標地點 0.03 經緯度以內的監視器 (約 3公里)
        const filtered = data.filter(item => {
            return Math.abs(item.PositionLat - target.lat) < 0.03 && 
                   Math.abs(item.PositionLon - target.lon) < 0.03;
        });

        if (filtered.length === 0) {
            container.innerHTML = "<p>此區域暫無可用監視器</p>";
            return;
        }

        filtered.forEach(item => {
            // 注意：由於 iframe 被擋，我們改用直接連結或嘗試抓取預覽圖
            // 新北市影像若無法顯示，會顯示「影像無法嵌入」提示，並提供點擊跳轉
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <p>${item.CCTVName}</p>
                <div class="img-container">
                    <iframe src="${item.VideoStreamURL}" style="width:100%; height:100%; border:none;"></iframe>
                </div>
                <a href="${item.VideoStreamURL}" target="_blank" class="btn-link">在新視窗打開即時影像</a>
            `;
            container.appendChild(card);
        });
    }

    fetchData();
</script>
</body>
</html>
