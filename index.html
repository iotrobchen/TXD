<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>後村堰附近路況</title>
</head>
<body>
  <h2>新北市即時路況影像</h2>
  <div id="images"></div>

  <script>
    const token = "ed5d1541-e782-401b-8bd5-f7b831193736";

    async function loadCCTV() {
      const res = await fetch(
        "https://tdx.transportdata.tw/api/basic/v2/Road/Traffic/CCTV/City/NewTaipei?$format=JSON",
        {
          headers: {
            "Authorization": "Bearer " + token
          }
        }
      );

      const data = await res.json();

      // 👉 篩選「後村堰」附近（用關鍵字）
      const filtered = data.filter(cctv =>
        cctv.LocationDescription &&
        cctv.LocationDescription.includes("後村堰")
      );

      const container = document.getElementById("images");
      container.innerHTML = "";

      filtered.forEach(cctv => {
        const img = document.createElement("img");
        img.src = cctv.CCTVPictures[0].ImageUrl;
        img.width = 400;

        const title = document.createElement("p");
        title.innerText = cctv.LocationDescription;

        container.appendChild(title);
        container.appendChild(img);
      });
    }

    loadCCTV();

    // 每60秒更新
    setInterval(loadCCTV, 60000);
  </script>
</body>
</html>
