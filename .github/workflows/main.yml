name: Update-CCTV-Data
on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小時跑一次
  workflow_dispatch:      # 讓你可以手動點按鈕執行
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run script
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: |
          pip install requests
          python fetch_cctv.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          # 檢查是否有變動，有變動才提交，沒變動就跳過不報錯
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update CCTV data"
            git push
          else
            echo "No changes to commit"
          fi
