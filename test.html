<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遙控飛行場即時資訊看板</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .location-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; border-left: 5px solid #007bff; padding-left: 10px; }
        .widget-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 15px; }
        iframe { border: 1px solid #ddd; border-radius: 4px; width: 100%; }
        footer { text-align: center; margin-top: 50px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>即時影像監控看板</h1>

    <!-- 區塊一：後村堰遙控飛機場 -->
    <section class="location-section">
        <h2>📍 新北市後村堰遙控飛機場</h2>
        <div class="widget-grid">
            <!-- 天氣 Widget -->
            <iframe src="https://www.twipcam.com/widget/v1/wx-info?lat=24.960462&lon=121.379289" height="150"></iframe>
            <!-- 附近影像清單 -->
            <iframe src="https://www.twipcam.com/widget/v1/query-cam-list-by-coordinate?lat=24.960462&lon=121.379289" height="400"></iframe>
            <!-- 風場預報 (縮放設為 8) -->
            <iframe src="https://www.twipcam.com/widget/v1/wind?lat=24.960462&lon=121.379289&zoom=8" height="400"></iframe>
        </div>
    </section>

    <!-- 區塊二：浮洲環保公園 -->
    <section class="location-section">
        <h2>📍 新北市浮洲環保公園</h2>
        <div class="widget-grid">
            <!-- 天氣 Widget -->
            <iframe src="https://www.twipcam.com/widget/v1/wx-info?lat=24.989167&lon=121.440114" height="150"></iframe>
            <!-- 附近影像清單 -->
            <iframe src="https://www.twipcam.com/widget/v1/query-cam-list-by-coordinate?lat=24.989167&lon=121.440114" height="400"></iframe>
            <!-- 風場預報 -->
            <iframe src="https://www.twipcam.com/widget/v1/wind?lat=24.989167&lon=121.440114&zoom=8" height="400"></iframe>
        </div>
    </section>
</div>

<footer>
    <p>資料來源：<a href="https://www.twipcam.com" target="_blank">twipcam 台灣即時影像監視器</a></p>
    <p>授權條款：創用 CC 姓名標示 3.0 台灣 (CC BY 3.0 TW)</p>
</footer>

</body>
</html>
