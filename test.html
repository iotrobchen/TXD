<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高程YOYO班202601期飛場資訊觀測站</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .location-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align:center; }
        h2 { color: #333; border-left: 5px solid #007bff; padding-left: 10px; }
        .status-bar { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
        .status-light { display:inline-block; padding:6px 12px; border-radius:20px; color:#fff; font-size:14px; }
        .good { background:#28a745; }
        .warn { background:#ffc107; color:#333; }
        .bad { background:#dc3545; }
        .update-time { font-size:13px; color:#666; }
        .widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; align-items: stretch; }
        @media (max-width: 768px) {
            .widget-grid { grid-template-columns: 1fr; }
        }
        .cam-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-top: 15px; }
        .cam-card { border: 1px solid #ddd; border-radius: 6px; padding: 10px; background: #fafafa; }
        .cam-card h3 { font-size: 16px; margin: 5px 0 10px; }
        iframe { width: 100%; border-radius: 4px; border: none; }
        .weather-row { margin-bottom: 10px; } /* 保留但不使用 */
        img { width: 100%; border-radius: 4px; }
        a { text-decoration: none; color: #007bff; font-size: 14px; }
        footer { text-align: center; margin-top: 50px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>高程YOYO班202601期飛場資訊觀測站</h1>

    <!-- 後村堰 -->
    <section class="location-section">
        <h2>📍 新北市後村堰遙控飛機場</h2>
        <div class="status-bar">
            <div class="status-light good" id="status-houchun">🟢 適合飛行</div>
            <div class="update-time" id="time-houchun"></div>
        </div>

        <!-- 天氣 + 風場（同一排） -->
        <div class="widget-grid">
            <iframe src="https://www.twipcam.com/widget/v1/wx-info?lat=24.960462333362326&lon=121.37928937808145" style="height: 28vh; min-height: 220px;"></iframe>
            <iframe src="https://www.twipcam.com/widget/v1/wind?lat=24.960462333362326&lon=121.37928937808145&zoom=8" style="height: 28vh; min-height: 220px;"></iframe>
        </div>

        <!-- 監視器 -->
        <div class="cam-grid">

            <div class="cam-card">
                <h3>樹林區大義路 / 柑園路二段</h3>
                <a href="https://www.twipcam.com/cam/nwt-000274" target="_blank">
                    <img src="https://c01.twipcam.com/cam/snapshot/nwt-000274.jpg">
                </a>
            </div>

            <div class="cam-card">
                <h3>國道三號 47K+200 北向</h3>
                <img src="https://cctvn.freeway.gov.tw/abs2mjpg/bmjpg?camera=34720">
            </div>

        </div>
    </section>

    <!-- 浮洲環保公園 -->
    <section class="location-section">
        <h2>📍 新北市浮洲環保公園</h2>
        <div class="status-bar">
            <div class="status-light warn" id="status-fuzhou">🟡 需注意風況</div>
            <div class="update-time" id="time-fuzhou"></div>
        </div>

        <!-- 天氣 + 風場（同一排） -->
        <div class="widget-grid">
            <iframe src="https://www.twipcam.com/widget/v1/wx-info?lat=24.98916663138627&lon=121.44011372563844" style="height: 28vh; min-height: 220px;"></iframe>
            <iframe src="https://www.twipcam.com/widget/v1/wind?lat=24.98916663138627&lon=121.44011372563844&zoom=8" style="height: 28vh; min-height: 220px;"></iframe>
        </div>

        <!-- 監視器 -->
        <div class="cam-grid">

            <div class="cam-card">
                <h3>台65線 9K+600</h3>
                <a href="https://www.twipcam.com/cam/t65-9k-600" target="_blank">
                    <img src="https://c01.twipcam.com/cam/snapshot/t65-10k-126.jpg">
                </a>
            </div>

            <div class="cam-card">
                <h3>土城抽水站</h3>
                <a href="https://www.twipcam.com/cam/wra-002469" target="_blank">
                    <img src="https://c01.twipcam.com/cam/snapshot/wra-002469.jpg">
                </a>
            </div>

        </div>
    </section>
</div>

<footer>
    <p>資料來源：twipcam / 公路總局 / 水利署</p>
</footer>

<script>
// 更新時間
function updateTime() {
    const now = new Date();
    const text = '更新時間：' + now.toLocaleString();
    document.getElementById('time-houchun').innerText = text;
    document.getElementById('time-fuzhou').innerText = text;
}

// 判斷飛行狀態
function getStatus(wind, gust) {
    const v = Math.max(wind || 0, gust || 0);
    if (v < 5) return { cls: 'good', text: '🟢 適合飛行' };
    if (v < 8) return { cls: 'warn', text: '🟡 需注意風況' };
    return { cls: 'bad', text: '🔴 不適合飛行' };
}

async function updateWindStatus() {
    try {
        // 後村堰
        const r1 = await fetch('https://api.open-meteo.com/v1/forecast?latitude=24.960462333362326&longitude=121.37928937808145&current=wind_speed_10m,wind_gusts_10m');
        const d1 = await r1.json();
        const s1 = getStatus(d1.current.wind_speed_10m, d1.current.wind_gusts_10m);
        const el1 = document.getElementById('status-houchun');
        el1.className = 'status-light ' + s1.cls;
        el1.innerText = s1.text + `（風${d1.current.wind_speed_10m.toFixed(1)}m/s 陣${d1.current.wind_gusts_10m.toFixed(1)}）`;

        // 浮洲
        const r2 = await fetch('https://api.open-meteo.com/v1/forecast?latitude=24.98916663138627&longitude=121.44011372563844&current=wind_speed_10m,wind_gusts_10m');
        const d2 = await r2.json();
        const s2 = getStatus(d2.current.wind_speed_10m, d2.current.wind_gusts_10m);
        const el2 = document.getElementById('status-fuzhou');
        el2.className = 'status-light ' + s2.cls;
        el2.innerText = s2.text + `（風${d2.current.wind_speed_10m.toFixed(1)}m/s 陣${d2.current.wind_gusts_10m.toFixed(1)}）`;
    } catch (e) {
        console.error('風速更新失敗', e);
    }
}

// 初始化
updateTime();
updateWindStatus();

// 定時更新
setInterval(updateTime, 60000);
setInterval(updateWindStatus, 60000);
</script>

</body>
</html>
